<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DBK LOGISTICS</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* ป้องกันการสกอลล์ซ้ำซ้อนภายนอก */
    }
    .container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbw_hpZ5Z67Tm5kP2NpClXkzb2YJ4vNTtV2t5c0ScrtkZrxf0DTTMwYcsJ4sRSTKyrdYaA/exec" 
      allow="geolocation; microphone; camera" 
      sandbox="allow-scripts allow-same-origin allow-forms">
    </iframe>
  </div>
</body>
</html>
